services:
  - type: web
    name: pymeet-backend
    env: docker
    plan: free
    rootDir: backend
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pymeet-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: "*"

databases:
  - name: pymeet-db
    databaseName: pymeet
    user: pymeet
    plan: free
